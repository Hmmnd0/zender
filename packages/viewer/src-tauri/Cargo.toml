[package]
name = "zender-viewer"
version = "0.1.0"
edition = "2021"

[lib]
name = "zender_viewer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1", features = [] }

[dependencies]
tauri = { version = "2.1", features = ["tray-icon"] }
tauri-plugin-store = "2.1"
tauri-plugin-notification = "2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"


[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true

