services:
  - type: web
    name: retrocast-directory
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    disk:
      name: retrocast-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /api/channels
